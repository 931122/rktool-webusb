<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rkdeveloptool WebUSB 示例</title>
</head>
<body>
  <h1>rkdeveloptool WebUSB 示例</h1>

  <div>
    <label for="pick-loader">选择loader文件</label>
    <input id="pick-loader" type="file" accept=".bin" />
  </div>
  <div>
    <label for="pick-file">选择固件文件</label>
    <input id="pick-file" type="file" accept=".bin,.img" />
  </div>

  <div>
    <button id="pick-device">选择 Rockchip 设备</button>
  </div>

  <div>
    <button id="dl-loader" disabled>下载 loader</button>
  </div>
  <div>
    <input id="command" type="text" value="ld" style="width: 360px;" />
    <button id="run">执行命令</button>
  </div>

  <pre id="output" style="background:#111;color:#0f0;padding:12px;min-height:220px;overflow:auto;"></pre>

  <script type="module">
    import { createRKToolWorker } from './src/worker-proxy.js';

    const output = document.getElementById('output');
    const pickLoaderInput = document.getElementById('pick-loader');
    const dlLoaderBtn = document.getElementById('dl-loader');
    const pickFileInput = document.getElementById('pick-file');
    const pickDeviceBtn = document.getElementById('pick-device');
    const runBtn = document.getElementById('run');
    const commandInput = document.getElementById('command');

    let selectedLoader = null;
    let selectedFile = null;

    function appendLine(text) {
      output.textContent += `${text}\n`;
      output.scrollTop = output.scrollHeight;
    }

    appendLine('初始化中...');
    const wrapper = await createRKToolWorker({
      runtime: 'browser',
      onStdout: appendLine,
      onStderr: appendLine,
      onLogWrite: (text) => appendLine(`[log] ${text}`),
    });
    appendLine('初始化完成（运行在 Worker 中）');

    pickLoaderInput.addEventListener('change', async () => {
      try {
        const loader = pickLoaderInput.files?.[0] || null;
        if (!loader) {
          selectedLoader = null;
          dlLoaderBtn.disabled = true;
          return;
        }
        selectedLoader = await wrapper.mountFile('MiniLoaderAll.bin', loader);
        dlLoaderBtn.disabled = false;
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });
    dlLoaderBtn.addEventListener('click', async () => {
      try {
        await wrapper.runCommand(['db', selectedLoader]);
        appendLine('loader 下载完成，点击“选择 Rockchip 设备”按钮重新连接');
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    pickFileInput.addEventListener('change', async () => {
      try {
        selectedFile = pickFileInput.files?.[0] || null;
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    pickDeviceBtn.addEventListener('click', async () => {
      try {
        await wrapper.requestDevice([{ vendorId: 0x2207 }]);
        appendLine('设备已授权');
      } catch (error) {
        appendLine(String(error.message || error));
      }
    });

    runBtn.addEventListener('click', async () => {
      const raw = commandInput.value.trim();
      if (!raw) {
        appendLine('请输入命令');
        return;
      }

      const args = raw.split(/\s+/);
      const options = {
        requestDevice: true,
      };

      if (selectedFile) {
        options.fileSource = selectedFile;
        options.fileName = selectedFile.name;
        options.replaceToken = '$FILE';
      }

      appendLine(`> ${args.join(' ')}`);
      const result = await wrapper.runCommand(args, options);
      appendLine(`exit=${result.exitCode}`);
    });
  </script>
</body>
</html>
